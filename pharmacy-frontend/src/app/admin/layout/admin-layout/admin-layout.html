<div class="layout">

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="navbar-logo">
  <img src="yousab logo.jpg" alt="yousab logo" height="50" style="object-fit: contain;" />
</div>
    <button class="logout-btn" (click)="logout()">
      <span>🚪</span> Logout
    </button>
  </header>

  <div class="body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <nav>
        <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span>📊</span> Dashboard
        </a>
        <a routerLink="/admin/orders" routerLinkActive="active">
          <span>📦</span> Orders
        </a>
        <a routerLink="/admin/product" routerLinkActive="active">
          <span>💊</span> Products
        </a>
        <a routerLink="/admin/category" routerLinkActive="active">
          <span>🗂️</span> Categories
        </a>
      </nav>
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
